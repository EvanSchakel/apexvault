name: Release Packaging

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build
        run: |
          mkdir -p bin
          javac -d bin $(find src -name "*.java")
      - name: Package JAR
        run: |
          mkdir -p dist
          printf "Main-Class: com.apex.Main\n" > manifest.txt
          jar cfm dist/apexvault-${{ github.event.release.tag_name }}.jar manifest.txt -C bin .
          rm -f manifest.txt
      - name: Upload artifact to release
        uses: ncipollo/release-action@v1
        with:
          artifacts: dist/*.jar
