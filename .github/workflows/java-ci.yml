name: Java CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Compile
        run: |
          mkdir -p bin
          javac -d bin $(find src -name "*.java")
      - name: Smoke run
        run: |
          echo 0 | java -cp bin com.apex.Main
      - name: Package
        run: |
          mkdir -p dist
          cp -r bin dist/
